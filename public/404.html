<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — DOCUMENT NOT FOUND</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='30' fill='%230c3b60'/><circle cx='32' cy='32' r='28' fill='none' stroke='%23d9bb73' stroke-width='3'/><path d='M32 8L36 30L56 32L36 34L32 56L28 34L8 32L28 30Z' fill='%23d9bb73'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07131f;color:#dcecf8;font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
.card{max-width:560px;background:linear-gradient(135deg,#0a2032,#103250);border:1px solid #d9bb73;padding:48px 32px;box-shadow:0 20px 60px rgba(0,0,0,.45)}
.stamp{display:inline-block;background:#8b0000;color:#fff;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:4px;padding:4px 12px;margin-bottom:24px;border:1px solid #cc0000}
h1{font-family:'Oswald',sans-serif;font-size:48px;color:#d9bb73;letter-spacing:8px;margin-bottom:8px}
.code{font-size:11px;letter-spacing:3px;color:#8fb4d4;margin-bottom:24px}
p{font-size:13px;line-height:1.7;color:#dcecf8;margin-bottom:32px}
a{display:inline-block;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:3px;color:#d9bb73;text-decoration:none;border:1px solid #d9bb73;padding:12px 28px;transition:background 120ms ease}
a:hover{background:rgba(217,187,115,0.15)}
a:focus-visible{outline:2px solid #d9bb73;outline-offset:3px}
</style>
</head>
<body>
  <div class="card">
    <div class="stamp">CLASSIFIED // 404</div>
    <h1>DOCUMENT NOT FOUND</h1>
    <div class="code">// REFERENCE NOT IN INDEX</div>
    <p>The specified path is not part of the current Daily Intelligence Brief. The document may have been superseded, redacted, or never existed.</p>
    <a href="/">Return to today's brief</a>
  </div>
</body>
</html>
