name: Daily Intelligence Brief

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to immutable commit SHAs (with the human-readable
      # version after #) so a compromised tag can't silently substitute
      # the action. Update via Dependabot or bump deliberately when
      # auditing the new SHA.
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install -g firebase-tools@13

      - name: Generate Daily Brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node update-content.js

      - name: Validate generated HTML
        run: |
          set -euo pipefail
          if grep -E '__[A-Z_]+__' public/index.html; then
            echo "FAIL: unsubstituted placeholder(s) found in public/index.html"
            exit 1
          fi
          if grep -q '<!--CONTENT_START:' public/index.html; then
            echo "FAIL: build markers leaked into deployable HTML"
            exit 1
          fi
          opens=$(grep -oE '<div\b' public/index.html | wc -l)
          closes=$(grep -oE '</div>' public/index.html | wc -l)
          if [ "$opens" != "$closes" ]; then
            echo "FAIL: <div> tag imbalance ($opens opens / $closes closes)"
            exit 1
          fi
          echo "Smoke test OK: $opens balanced divs, no placeholders, no build markers"

      - name: Write service account credentials
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$SA_JSON" > "$RUNNER_TEMP/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project daily-security-brief --non-interactive
